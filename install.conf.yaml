- defaults:
    link:
        create: true
        relink: true
- create:
    - ~/.config
    - ~/.config/karabiner
    - ~/.config/zed
    - ~/.ssh
    - ~/Repositories
- link:
    ~/.config/karabiner/karabiner.json: config/karabiner/karabiner.json
    ~/.config/zed/settings.json: config/zed/settings.json
    ~/.ssh/config: ssh/config
    ~/.gitconfig: gitconfig
    ~/.gitignore_global: gitignore_global
    ~/Brewfile: Brewfile
    ~/mise.toml: mise.toml
    ~/.zshrc: zshrc
    ~/.zshenv: zshenv
